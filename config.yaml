# ============================================
# SmartAgent 配置文件 (企业版 v2.0)
# 基于 LangChain ReAct 架构
# ============================================

llm:
  # 模型提供商: openai / deepseek / zhipu / qwen / ollama / custom
  provider: "deepseek"
  model: "deepseek-chat"
  api_key: ""          # 留空自动按 provider 从环境变量读取
  base_url: ""         # 留空按 provider 自动补全
  temperature: 0.7
  max_tokens: 4096
  timeout: 60          # 秒 (单次 API 调用超时)

# --- 备用模型 (fallback) ---
fallback:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key: "${DEEPSEEK_API_KEY}"

# --- 记忆系统 ---
memory:
  short_term:
    max_turns: 20             # 保留最近 N 轮对话
    summarize_threshold: 10   # 超过此轮数自动摘要压缩

  long_term:
    enabled: true
    db_path: "./data/memory.db"
    collection_name: "agent_memory"

# --- RAG 知识库 ---
rag:
  enabled: true
  embedding_model: "text-embedding-3-small"
  embedding_provider: "openai"
  chunk_size: 500
  chunk_overlap: 50
  persist_dir: "./data/vectordb"
  top_k: 5

# --- 工具系统 ---
tools:
  # 允许的工具列表，空列表=全部启用
  enabled:
    - "web_search"
    - "fetch_url"
    - "read_file"
    - "write_file"
    - "run_python"
    - "calculator"

  # 危险工具需确认
  dangerous:
    - "run_python"
    - "write_file"
    - "run_shell"

  max_calls_per_turn: 10

  # Agent 读写文件的根目录（相对路径自动拼接到此目录下）
  # 部署到服务器时改为 "/data/smart_agent/output" 等绝对路径
  output_dir: "./output"

# --- Agent 行为 ---
agent:
  name: "SmartAgent"
  max_iterations: 15          # 单次任务最大迭代次数
  verbose: true               # 显示思考过程
  system_prompt: |
    【角色定义】
    你是 SmartAgent，一个基于 ReAct 架构构建的智能 AI 助手。你由用户定制开发，不是 DeepSeek、OpenAI 或其他任何厂商的官方助手。
    绝对不要声称自己是 DeepSeek、ChatGPT 或其他 AI 产品——你只有一个身份：SmartAgent。
    你的行为风格：专业、严谨、高效，用简洁清晰的语言回应用户。

    【核心目标】
    1. 对用户任务进行多步骤推理与规划，确保从输入到输出的全流程闭环
    2. 保证回答准确可靠 —— 涉及实时数据、外部信息时优先使用工具获取，不依赖训练数据凭空回答
    3. 持续优化回答质量，代码执行后检查结果是否正确，必要时修正重试

    【行为规则】
    - 当被问"你是谁"时，回答你是 SmartAgent
    - 复杂任务先分解为子任务，再逐步执行，每步确认结果
    - 搜索优先于猜测：不确定的事实必须通过工具搜索确认
    - 如果有多个可行方案，选择最高效的直接执行，不要逐一列出后再等用户选择
    - 用中文回答用户，保持语气温和专业

    【资源调用】
    - 可调用工具包括：网络搜索、网页抓取、Python 代码执行、文件读写、知识库检索
    - 单次对话最大工具调用次数 10 次，超出后需总结当前进度
    - 文件操作限定在输出目录内，不得修改系统文件或配置文件

    【容错机制】
    - 工具调用失败时，分析错误原因后自动重试最多 2 次，仍失败则告知用户并提供替代方案
    - API 超时或网络异常时，等待 3 秒后重试一次，若仍失败则回退使用已有知识回答并注明局限性
    - 遇到无法处理的任务时，明确告知用户能力边界，不强行执行或编造结果

  # 技能标签（用于智能任务路由匹配，Agent 创建时可选）
  skills: ["通用"]

# --- 五板块提示词模板（创建 Agent 时的默认结构）---
prompt_template:
  role_definition: "你是 {agent_name}，一个专业的 AI 助手。\n你的行为风格：专业、严谨、高效，用简洁清晰的语言回应用户。"
  core_objectives: "1. 准确理解用户意图，高效完成分配的任务\n2. 涉及实时数据时优先使用工具获取，不凭空回答\n3. 持续优化回答质量，检查结果是否正确"
  behavior_rules: "- 复杂任务先分解再逐步执行\n- 搜索优先于猜测：不确定的事实必须工具搜索确认\n- 用中文回答，语气温和专业\n- 首次接触用户时简要介绍自己的能力范围"
  resource_calls: "- 可调用工具：网络搜索、网页抓取、Python代码执行、文件读写、知识库检索\n- 文件操作限定在输出目录内，不得修改系统文件"
  error_handling: "- 工具调用失败时自动重试最多2次，仍失败则告知用户\n- API超时后等待重试，仍失败则回退已有知识并注明局限性\n- 遇到无法处理的任务，明确告知能力边界"

# --- 预定义技能标签 (创建Agent时可选) ---
predefined_skills:
  - id: "coding"
    label: "编程开发"
    desc: "编写代码、调试 Bug、代码重构、算法实现"
  - id: "research"
    label: "调研分析"
    desc: "市场调研、技术研究、文献分析、竞品对比"
  - id: "writing"
    label: "文档写作"
    desc: "文章撰写、文案润色、翻译校对、简历优化"
  - id: "data"
    label: "数据处理"
    desc: "数据清洗、统计分析、报表制作、数据可视化"
  - id: "file_ops"
    label: "文件操作"
    desc: "文件读写、格式转换、压缩解压、批量处理"
  - id: "shell"
    label: "运维脚本"
    desc: "Shell/Python脚本、自动化部署、系统管理"
  - id: "resume"
    label: "简历优化"
    desc: "简历润色、排版美化、面试建议、求职指导"
  - id: "troubleshooting"
    label: "故障排查"
    desc: "Bug定位、日志分析、性能诊断、问题溯源"
  - id: "architecture"
    label: "架构设计"
    desc: "系统架构、技术选型、方案设计、代码评审"
  - id: "general"
    label: "通用助手"
    desc: "通用对话、问答咨询、日常辅助"

# --- Tracing 可观测性 ---
tracing:
  enabled: false               # 设为 true 并设置 LANGCHAIN_API_KEY 启用
  project: "smart_agent"       # LangSmith 项目名

# --- Web 服务器 ---
server:
  host: "127.0.0.1"
  port: 8080

# --- MySQL 数据库 (企业版) ---
# 留空则使用内存模式 (兼容旧版)
database:
  host: "127.0.0.1"
  port: 3306
  user: "smart_agent"
  password: ""
  database: "smart_agent"
  # 连接池配置
  pool_size: 10
  max_overflow: 20
  pool_recycle: 3600

# --- 认证 (企业版) ---
auth:
  enabled: true                    # 设为 false 关闭认证
  jwt_secret_key: ""               # 留空自动生成 (生产环境务必设置!)
  jwt_expire_minutes: 480          # Token 有效期 (分钟)
  bcrypt_rounds: 12

# --- 速率限制 (企业版) ---
rate_limit:
  enabled: true
  max_requests_per_minute: 120     # 每 IP 每分钟最大请求数
  burst: 30                        # 突发容量
  # 白名单 IP (不受限制)
  whitelist_ips: []

# --- 日志 (企业版) ---
logging:
  level: "INFO"                    # DEBUG / INFO / WARNING / ERROR
  dir: "./logs"
  json_format: false               # true = JSON 格式 (适合 ELK 采集)
  mysql_errors: true               # ERROR 级别日志写入 MySQL

# --- 多 Agent 编排 (企业版 v3.0) ---
orchestrator:
  # 默认执行模式: auto, single, parallel, pipeline, collaborative
  default_mode: "auto"

  # 并行执行配置
  parallel:
    max_agents: 4              # 最多同时使用几个 Agent
    timeout_seconds: 600       # 单个 Agent 超时 (秒)

  # 流水线配置
  pipeline:
    max_stages: 5              # 最多几个阶段
    # 默认流水线阶段名
    stage_names:
      - "分析拆解"
      - "方案设计"
      - "执行实施"
      - "验证检查"
      - "总结输出"

  # 协作讨论配置
  collaborative:
    rounds: 2                  # 讨论轮次
    synthesizer: "first"       # 综合者: first (第一个Agent) / 或指定 Agent 名

  # 自动模式检测阈值
  auto_detect:
    complexity_threshold: 100  # 描述超过此字数视为复杂任务
    parallel_score_min: 2      # 并行关键词最低匹配分
    pipeline_score_min: 2      # 流水线关键词最低匹配分

# --- 监控 (企业版) ---
monitoring:
  enabled: true
  metrics_path: "/metrics"         # Prometheus 抓取路径
  health_path: "/health"           # 健康检查路径
