# ============================================
# SmartAgent Nginx 反向代理配置 (HTTPS)
# ============================================
#
# 使用前:
#   1. 安装 certbot: apt install certbot python3-certbot-nginx
#   2. 签发证书: certbot --nginx -d your-domain.com
#   3. certbot 会自动修改此文件添加 SSL 配置
#
# 部署:
#   cp nginx.conf /etc/nginx/sites-available/smart_agent
#   ln -s /etc/nginx/sites-available/smart_agent /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

upstream smart_agent_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;

    # Certbot ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书 (certbot 自动管理)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/smart_agent_access.log;
    error_log  /var/log/nginx/smart_agent_error.log;

    # 文件上传限制
    client_max_body_size 50m;
    client_body_timeout 120s;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/markdown;
    gzip_min_length 1000;

    # SSE 流式支持 (不缓冲)
    location /api/chat {
        proxy_pass http://smart_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # API 代理
    location /api/ {
        proxy_pass http://smart_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 健康检查 + 指标
    location /health {
        proxy_pass http://smart_agent_backend;
        proxy_set_header Host $host;
    }

    location /metrics {
        # 限制只有 Prometheus 服务器能访问 (替换为你的 Prometheus IP)
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://smart_agent_backend;
        proxy_set_header Host $host;
    }

    # 前端页面
    location / {
        proxy_pass http://smart_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
