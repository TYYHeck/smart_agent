# ============================================================
# Alembic 迁移配置
# ============================================================

[alembic]
# 迁移脚本目录
script_location = migrations

# 数据库 URL（会被 env.py 中的环境变量覆盖）
sqlalchemy.url = mysql+aiomysql://smart_agent:password@127.0.0.1:3306/smart_agent?charset=utf8mb4

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
